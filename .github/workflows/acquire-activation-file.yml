name: Acquire activation file

# One-time-use workflow: generates a Unity manual-activation request file
# (.alf) tied to a GitHub-hosted runner, so it can be uploaded to Unity's
# license portal to obtain a .ulf license file for the UNITY_LICENSE secret.
# Safe to delete once the license is set up - see CLAUDE.md.

on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request manual activation file 🔑
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2

      - name: Expose as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.getManualLicenseFile.outputs.filePath }}
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
